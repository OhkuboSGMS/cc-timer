name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Test path resolution
        shell: bash
        run: |
          node --input-type=module -e "
            import { getDirname } from './dist/paths.js';
            import { resolve } from 'node:path';
            import { existsSync } from 'node:fs';

            const dir = getDirname(import.meta.url);
            console.log('getDirname:', dir);

            const mcpPath = resolve(dir, 'dist', 'mcp-server-entry.js');
            console.log('MCP server path:', mcpPath);
            console.log('MCP server exists:', existsSync(mcpPath));

            if (!existsSync(mcpPath)) process.exit(1);
          "

      - name: Test daemon startup (exits on missing setup)
        shell: bash
        run: |
          node dist/index.js 2>&1 | head -5 || true
          # Should print "Setup not complete" and exit

      - name: Test setup prompt detection
        shell: bash
        run: |
          node --input-type=module -e "
            const platform = process.platform;
            const expected = {
              linux: 'Linux',
              darwin: 'macOS',
              win32: 'Windows',
            };
            console.log('Platform:', platform);
            console.log('Expected label:', expected[platform]);
            if (!expected[platform]) {
              console.error('Unknown platform');
              process.exit(1);
            }
            console.log('Platform detection OK');
          "

      - name: Test lock file (cross-platform process check)
        shell: bash
        run: |
          node --input-type=module -e "
            import { loadConfig } from './dist/config.js';
            import { StateManager } from './dist/state.js';

            const config = loadConfig();
            const state = new StateManager(config);

            // Should not be locked initially
            console.log('Locked:', state.isLocked());
            if (state.isLocked()) {
              console.error('Should not be locked');
              process.exit(1);
            }

            // Lock and verify
            const locked = state.lock();
            console.log('Lock acquired:', locked);
            if (!locked) {
              console.error('Failed to acquire lock');
              process.exit(1);
            }

            console.log('Is locked:', state.isLocked());
            state.unlock();
            console.log('After unlock:', state.isLocked());

            if (state.isLocked()) {
              console.error('Should be unlocked');
              process.exit(1);
            }
            console.log('Lock test passed');
          "
